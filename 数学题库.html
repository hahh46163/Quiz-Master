<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <script>
  (function () {
    var path = window.location.pathname;
    var dir;
    if (path.endsWith('/')) dir = path;
    else if (/\.html?$/i.test(path)) dir = path.replace(/[^/]+$/, '');
    else dir = path + '/';
    var b = document.createElement('base');
    b.href = dir;
    var meta = document.head.querySelector('meta[charset]');
    if (meta) meta.insertAdjacentElement('afterend', b);
    else document.head.insertBefore(b, document.head.firstChild);
  })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=index.html#question-bank">
  <title>正在跳转至题库…</title>
  <script>location.replace('index.html#question-bank');</script>
</head>
<body>
  <p style="font-family: system-ui; padding: 2rem;">正在跳转到首页题库… 若未自动跳转，请<a href="index.html#question-bank">点击这里</a>。</p>
</body>
</html>
